name: Publish

# Tag a commit vX.Y.Z to release every package at that version.
# Publishes via NuGet Trusted Publishing (OIDC) - no API key secret needed.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Anthology.slnx

      - name: Build
        run: dotnet build Anthology.slnx -c Release --no-restore

      # Some suites need hardware CI lacks (they pass locally with it), so they're excluded:
      # Clay (uncommitted model assets), Slang + Graphite.Compiler (Slang native binaries),
      # Graphite (GPU backends on a headless runner). Everything else gates the release.
      - name: Test
        run: dotnet test Anthology.slnx -c Release --no-build --filter "FullyQualifiedName!~Prowl.Clay.Tests&FullyQualifiedName!~Prowl.Slang.Test&FullyQualifiedName!~Prowl.Graphite.Compiler.Tests&FullyQualifiedName!~Prowl.Graphite.Tests"

      # Slang's native binaries are not committed; fetch them (dotnet-script) so they pack into runtimes/.
      - name: Fetch Slang native binaries
        working-directory: Slang/Native
        run: |
          dotnet tool install -g dotnet-script
          dotnet-script UpdateSources.csx

      - name: Pack
        run: dotnet pack Anthology.slnx -c Release --no-build -o artifacts

      - name: NuGet auth (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Wulferis

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
